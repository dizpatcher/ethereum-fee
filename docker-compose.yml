services:
  backend:
    image: dizpatcher/eth-fee-backend:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./notebooks/models:/notebooks/models:ro
    expose:
      - "8000"

  frontend:
    image: dizpatcher/eth-fee-frontend:latest
    restart: unless-stopped
    ports:
      - "8765:80"
    depends_on:
      - backend
